<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- Dark rounded background for the app icon -->
    <rect width="512" height="512" rx="110" fill="#111111"/>

    <!-- Left side: Basketball -->
    <g clip-path="url(#left-half)">
        <!-- Base orange circle -->
        <circle cx="256" cy="256" r="160" fill="#E65100" />
        
        <!-- Basketball lines (black stroke) -->
        <circle cx="256" cy="256" r="160" fill="none" stroke="#111111" stroke-width="14"/>
        
        <!-- vertical curve -->
        <path d="M 256 96 C 160 140, 160 372, 256 416" fill="none" stroke="#111111" stroke-width="14"/>
        <!-- horizontal line -->
        <line x1="96" y1="256" x2="256" y2="256" stroke="#111111" stroke-width="14"/>
    </g>

    <!-- Right side: PlayStation -->
    <g clip-path="url(#right-half)">
        <!-- Base light grey circle -->
        <circle cx="256" cy="256" r="160" fill="#E0E0E0" />
        <circle cx="256" cy="256" r="160" fill="none" stroke="#111111" stroke-width="14"/>

        <!-- Triangle (Green) -->
        <polygon points="350,192 334,220 366,220" fill="none" stroke="#4CAF50" stroke-width="8" stroke-linejoin="round"/>
        
        <!-- Circle (Red) -->
        <circle cx="395" cy="256" r="14" fill="none" stroke="#F44336" stroke-width="8"/>
        
        <!-- Cross (Blue) -->
        <path d="M 338 289 L 362 313 M 362 289 L 338 313" fill="none" stroke="#2196F3" stroke-width="8" stroke-linecap="round"/>

        <!-- Square (Pink) -->
        <rect x="291" y="242" width="28" height="28" fill="none" stroke="#E91E63" stroke-width="8" rx="4"/>
    </g>
    
    <!-- Central Divider -->
    <line x1="256" y1="96" x2="256" y2="416" stroke="#111111" stroke-width="14" stroke-linecap="round"/>

    <defs>
        <clipPath id="left-half">
            <rect x="0" y="0" width="256" height="512"/>
        </clipPath>
        <clipPath id="right-half">
            <rect x="256" y="0" width="512" height="512"/>
        </clipPath>
    </defs>
</svg>